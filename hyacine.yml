contentDir: src/posts
assetsDir: src/assets
databaseDir: .hyacine
defaultCategories: []
postExtension:
  - .md
  - .mdx
assetResolution: standard

themeConfigPath: src/theme.config.ts
themeConfigDefPath: src/toolkit/themeConfig.ts
themeConfigDefType: ShokaXThemeConfig
themeConfigTemplatePath: src/theme.config.template.txt

fonts:
  - path: src/assets/fonts/LXGWWenKai-Regular.ttf
    type: standard
  - path: src/assets/fonts/MapleMono-CN-Regular.ttf
    type: monospace

images:
  - path: src/assets/avatar.avif
  - path: src/assets/images/cover-1.avif
  - path: src/assets/images/cover-2.avif
  - path: src/assets/images/cover-3.avif
  - path: src/assets/images/cover-4.avif
  - path: src/assets/images/cover-5.avif
  - path: src/assets/images/cover-6.avif

embedding:
  enabled: false
  model: onnx-community/Qwen3-Embedding-0.6B-ONNX
  maxChunkChars: 512

summary:
  enabled: true
  apiBaseUrl: https://chat.ecnu.edu.cn/open/api/v1
  apiKey: sk-06b06ae0a3d94b53bc636ee70763cb95
  model: ecnu-max
  maxInputChars: 50000
  maxOutputTokens: 256
  temperature: 0.2
